name: Build Video Encoder GDExtension

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_CPP_BRANCH: 4.4.1-stable

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y scons pkg-config libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev
      - name: Build Debug
        run: scons platform=linux target=template_debug arch=x86_64 -j$(nproc)
      - name: Build Release
        run: scons platform=linux target=template_release arch=x86_64 -j$(nproc)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libraries
          path: godot_project/addons/video_encoder/bin/linux/

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-ffmpeg mingw-w64-x86_64-scons mingw-w64-x86_64-pkgconf git
      - name: Build Debug
        run: scons platform=windows target=template_debug arch=x86_64 -j$(nproc)
      - name: Build Release
        run: scons platform=windows target=template_release arch=x86_64 -j$(nproc)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libraries
          path: godot_project/addons/video_encoder/bin/windows/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: brew install ffmpeg scons
      - name: Build x86_64
        run: |
          scons platform=macos target=template_debug arch=x86_64 -j$(sysctl -n hw.ncpu)
          scons platform=macos target=template_release arch=x86_64 -j$(sysctl -n hw.ncpu)
      - name: Build arm64
        run: |
          scons platform=macos target=template_debug arch=arm64 -j$(sysctl -n hw.ncpu)
          scons platform=macos target=template_release arch=arm64 -j$(sysctl -n hw.ncpu)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libraries
          path: godot_project/addons/video_encoder/bin/macos/

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
      - name: Install SCons
        run: pip install scons
      - name: Setup FFmpeg Android
        run: python scripts/setup_ffmpeg_mobile.py android "${{ steps.setup-ndk.outputs.ndk-path }}"
      - name: Build ARM64
        run: |
          scons platform=android target=template_debug arch=arm64 android_api=24
          scons platform=android target=template_release arch=arm64 android_api=24
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          FFMPEG_PATH: ${{ github.workspace }}/ffmpeg-android
      - name: Build ARMv7
        run: |
          scons platform=android target=template_debug arch=arm32 android_api=24
          scons platform=android target=template_release arch=arm32 android_api=24
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          FFMPEG_PATH: ${{ github.workspace }}/ffmpeg-android
      - name: Build x86_64
        run: |
          scons platform=android target=template_debug arch=x86_64 android_api=24
          scons platform=android target=template_release arch=x86_64 android_api=24
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          FFMPEG_PATH: ${{ github.workspace }}/ffmpeg-android
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-libraries
          path: godot_project/addons/video_encoder/bin/android/

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: brew install scons
      - name: Setup FFmpeg iOS
        run: python scripts/setup_ffmpeg_mobile.py ios
      - name: Build ARM64 Device
        run: |
          scons platform=ios target=template_debug arch=arm64 ios_simulator=false
          scons platform=ios target=template_release arch=arm64 ios_simulator=false
        env:
          FFMPEG_PATH: ${{ github.workspace }}/ffmpeg-ios
      - name: Build x86_64 Simulator
        run: |
          scons platform=ios target=template_debug arch=x86_64 ios_simulator=true
          scons platform=ios target=template_release arch=x86_64 ios_simulator=true
        env:
          FFMPEG_PATH: ${{ github.workspace }}/ffmpeg-ios
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-libraries
          path: godot_project/addons/video_encoder/bin/ios/
